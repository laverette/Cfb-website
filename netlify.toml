[build]
  publish = "Frontend"
  functions = "netlify/functions"

[dev]
  publish = "Frontend"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/picks/current-week"
  to = "/.netlify/functions/picks-current-week"
  status = 200

# Use * / :splat so weekId is forwarded in the query string (named :weekId placeholders are unreliable here).
[[redirects]]
  from = "/api/picks/games/week/*"
  to = "/.netlify/functions/picks-games-by-week?weekId=:splat"
  status = 200

[[redirects]]
  from = "/api/auth/login"
  to = "/.netlify/functions/auth-login"
  status = 200

[[redirects]]
  from = "/api/auth/register"
  to = "/.netlify/functions/auth-register"
  status = 200

[[redirects]]
  from = "/api/auth/profile"
  to = "/.netlify/functions/auth-profile"
  status = 200

[[redirects]]
  from = "/api/admin/current-week"
  to = "/.netlify/functions/admin-current-week"
  status = 200

[[redirects]]
  from = "/api/admin/set-current-week"
  to = "/.netlify/functions/admin-set-current-week"
  status = 200

[[redirects]]
  from = "/api/admin/weeks"
  to = "/.netlify/functions/admin-weeks"
  status = 200

[[redirects]]
  from = "/api/admin/create-week"
  to = "/.netlify/functions/admin-create-week"
  status = 200

[[redirects]]
  from = "/api/admin/cfbd-games"
  to = "/.netlify/functions/admin-cfbd-games"
  status = 200

[[redirects]]
  from = "/api/admin/games/save-week-games"
  to = "/.netlify/functions/admin-save-week-games"
  status = 200

[[redirects]]
  from = "/api/admin/games/reorder"
  to = "/.netlify/functions/admin-reorder-games"
  status = 200

[[redirects]]
  from = "/api/admin/games/week/*"
  to = "/.netlify/functions/admin-games-by-week?weekId=:splat"
  status = 200

# Wildcard must be last among /api/admin/games/* routes so week/save/reorder are not captured.
[[redirects]]
  from = "/api/admin/games/*"
  to = "/.netlify/functions/admin-delete-game?gameId=:splat"
  status = 200