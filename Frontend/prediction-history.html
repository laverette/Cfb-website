<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="styles/site-theme.css">
  <link rel="stylesheet" href="Resources/Styles/weeklypicks.css">
</head>
<body>
  <!-- Site Header -->
  <nav class="navbar weeklypicks-navbar site-nav">
    <div class="container-fluid">
      <div class="navbar-content-weekly site-nav-inner">
        <button class="hamburger-menu-btn" onclick="toggleMenu()" aria-label="Menu" aria-expanded="false" aria-controls="dropdownMenu">
          <span></span><span></span><span></span>
        </button>
        <div class="dropdown-menu" id="dropdownMenu">
          <a href="index.html" class="dropdown-item">🏠 Home</a>
          <a href="weeklypicks.html" class="dropdown-item">📅 Weekly Picks</a>
          <a href="teams.html" class="dropdown-item">🏈 Teams</a>
          <a href="prediction-history.html" class="dropdown-item">🧾 History</a>
          <a href="mypredictions.html" class="dropdown-item">📊 My Predictions</a>
          <a href="predictor.html" class="dropdown-item">🤖 Model</a>
          <a href="CFPPredictions.html" class="dropdown-item">🏆 CFP Picks</a>
          <a href="list.html" class="dropdown-item">👑 Heisman</a>
          <a href="login.html" class="dropdown-item">🔐 Login</a>
          <a href="admin.html" class="dropdown-item">🛠️ Admin</a>
        </div>

        <h1 class="site-title">My College Football Site</h1>

        <div id="auth-nav" class="navbar-login-section"></div>
      </div>
    </div>
  </nav>
  <div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>

  <div class="container mt-4 page-shell">
    <h1 class="page-title">📊 Your Prediction History</h1>
    
    <!-- User Selection -->
    <div class="section-card" style="margin: 1.5rem 0;">
      <h3 class="gold-heading" style="text-align:center; margin: 0 0 1rem 0;">Select User</h3>
      <div style="text-align: center; margin: 1rem 0;">
        <select id="userDropdown" class="site-select" style="margin: 0 10px; min-width: 220px;">
          <option value="">Choose a person...</option>
        </select>
        <button id="loadUserHistory" class="btn btn-brown" style="margin: 0 5px; padding: 8px 15px;">View History</button>
      </div>
    </div>

    <!-- History Display -->
    <div id="historyDisplay" style="margin-top: 2rem;"></div>
    
    <!-- Back Button -->
    <div style="text-align: center; margin: 2rem 0;">
      <a href="weeklypicks.html" class="btn btn-brown" style="padding: 10px 20px;">← Back to Weekly Picks</a>
    </div>
  </div>

  <script src="scripts/auth-ui.js"></script>
  <script>
    let allPredictions = [];

    document.addEventListener('DOMContentLoaded', function() {
      loadUsersAndPredictions();
    });

    // Load users and predictions from the API
    async function loadUsersAndPredictions() {
      try {
        // Load users
        const usersResponse = await fetch('http://localhost:5000/api/User');
        if (!usersResponse.ok) {
          throw new Error('Could not load users');
        }
        const users = await usersResponse.json();
        
        // Load all predictions
        const predictionsResponse = await fetch('http://localhost:5000/api/Prediction');
        if (!predictionsResponse.ok) {
          throw new Error('Could not load predictions');
        }
        const predictions = await predictionsResponse.json();
        
        allPredictions = predictions;
        populateUserDropdown(users);
      } catch (error) {
        console.error('Error loading data:', error);
        document.getElementById('historyDisplay').innerHTML = `
          <div style="background-color: #2E2E2E; padding: 2rem; border-radius: 8px; text-align: center;">
            <h3 style="color: #F5F5F5;">Could not load data</h3>
            <p style="color: #F5F5F5;">Make sure the API is running and accessible.</p>
          </div>
        `;
      }
    }
  

    // Get user name by ID
    function getUserNameById(userId, users) {
      const user = users.find(u => u.id === userId);
      return user ? user.name : `User ${userId}`;
    }

    // Populate the user dropdown
    function populateUserDropdown(users) {
      const dropdown = document.getElementById('userDropdown');
      
      // Clear existing options except the first one
      dropdown.innerHTML = '<option value="">Choose a person...</option>';
      
      // Add users from API
      users.forEach(user => {
        const option = document.createElement('option');
        option.value = user.id;
        option.textContent = user.name;
        dropdown.appendChild(option);
      });
    }

    // Load user's individual history
    async function loadUserHistory() {
      const selectedUserId = document.getElementById('userDropdown').value;
      if (!selectedUserId) {
        alert('Please select a person from the dropdown!');
        return;
      }

      try {
        // Get user details
        const userResponse = await fetch(`http://localhost:5000/api/User/${selectedUserId}`);
        if (!userResponse.ok) {
          throw new Error('Could not load user details');
        }
        const user = await userResponse.json();

        // Get user's predictions
        const predictionsResponse = await fetch(`http://localhost:5000/api/Prediction/user/${selectedUserId}`);
        if (!predictionsResponse.ok) {
          throw new Error('Could not load user predictions');
        }
        const userHistory = await predictionsResponse.json();
        
        if (userHistory.length === 0) {
          document.getElementById('historyDisplay').innerHTML = `
            <div style="background-color: #2E2E2E; padding: 2rem; border-radius: 8px; text-align: center;">
              <h3 style="color: #F5F5F5;">No history found for "${user.name}"</h3>
              <p style="color: #F5F5F5;">Make sure they've submitted picks before!</p>
            </div>
          `;
          return;
        }

        // Sort by week (newest first)
        userHistory.sort((a, b) => (b.week || 0) - (a.week || 0));

        let html = `
          <div style="background-color: #2E2E2E; padding: 1rem; border-radius: 8px; margin-bottom: 1rem;">
            <h2 style="color: #FFD700; text-align: center; margin: 0;">${user.name}'s Prediction History</h2>
            <p style="color: #F5F5F5; text-align: center; margin: 5px 0;">${userHistory.length} week(s) of picks</p>
          </div>
          <div style="display: flex; flex-direction: column; gap: 20px;">
        `;

        userHistory.forEach(entry => {
          html += `
            <div style="background-color: #3E2723; padding: 20px; border-radius: 8px; border: 1px solid #8D6E63;">
              <h3 style="color: #FFD700; margin: 0 0 15px 0; text-align: center;">Week ${entry.week || 'Unknown'}</h3>
              <p style="color: #F5F5F5; margin: 0 0 15px 0; text-align: center; font-size: 0.9rem;">Submitted: ${new Date(entry.submittedAt).toLocaleDateString()}</p>
              <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px;">
          `;
          
          // Show all picks in a nice grid
          const games = [
            entry.game1, entry.game2, entry.game3, entry.game4, entry.game5, entry.game6,
            entry.game7, entry.game8, entry.game9, entry.game10, entry.game11, entry.game12
          ];
          
          games.forEach((game, index) => {
            if (game && game.trim() !== '') {
              html += `
                <div style="background-color: #2E2E2E; padding: 8px; border-radius: 4px; border: 1px solid #8D6E63; text-align: center;">
                  <span style="color: #FFD700; font-weight: bold;">Game ${index + 1}</span><br>
                  <span style="color: #F5F5F5;">${game}</span>
                </div>
              `;
            }
          });
          
          html += `
              </div>
            </div>
          `;
        });

        html += '</div>';
        document.getElementById('historyDisplay').innerHTML = html;
      } catch (error) {
        console.error('Error loading user history:', error);
        document.getElementById('historyDisplay').innerHTML = `
          <div style="background-color: #2E2E2E; padding: 2rem; border-radius: 8px; text-align: center;">
            <h3 style="color: #F5F5F5;">Error loading history</h3>
            <p style="color: #F5F5F5;">Could not load user prediction history.</p>
          </div>
        `;
      }
    }

    // Event Listeners
    document.getElementById('loadUserHistory').addEventListener('click', loadUserHistory);
    
  </script>
  <script>
    function closeMenu() {
      const menu = document.getElementById('dropdownMenu');
      const button = document.querySelector('.hamburger-menu-btn');
      const overlay = document.getElementById('menuOverlay');
      if (!menu || !button || !overlay) return;
      menu.classList.remove('show');
      button.classList.remove('active');
      button.setAttribute('aria-expanded', 'false');
      overlay.classList.remove('show');
      document.body.classList.remove('menu-open');
    }

    function toggleMenu() {
      const menu = document.getElementById('dropdownMenu');
      const button = document.querySelector('.hamburger-menu-btn');
      const overlay = document.getElementById('menuOverlay');
      if (!menu || !button || !overlay) return;
      const isOpening = !menu.classList.contains('show');
      menu.classList.toggle('show');
      button.classList.toggle('active');
      button.setAttribute('aria-expanded', isOpening ? 'true' : 'false');
      overlay.classList.toggle('show', isOpening);
      document.body.classList.toggle('menu-open', isOpening);
    }

    document.addEventListener('click', function(event) {
      const menu = document.getElementById('dropdownMenu');
      const button = document.querySelector('.hamburger-menu-btn');
      if (!menu || !button) return;
      if (!menu.contains(event.target) && !button.contains(event.target)) closeMenu();
    });

    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape') closeMenu();
    });
  </script>
</body>
</html>
