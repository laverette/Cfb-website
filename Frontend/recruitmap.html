<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recruit Map · CFB</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="styles/site-theme.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin="">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" crossorigin="">
  <style>
    .recruit-shell { width: min(1400px, calc(100% - 2rem)); margin: 0 auto 2rem auto; padding-top: 1rem; }
    .recruit-filters.section-card {
      padding: 0.9rem 1.15rem;
      margin-bottom: 0.85rem;
    }
    .recruit-layout {
      display: grid;
      grid-template-columns: minmax(320px, 380px) minmax(0, 1fr);
      gap: 1rem;
      align-items: start;
    }
    @media (max-width: 991px) {
      .recruit-layout { grid-template-columns: 1fr; }
    }
    .recruit-map-panel {
      padding: 1rem !important;
      align-self: start;
    }
    .recruit-map-panel h3 {
      margin: 0 0 0.55rem 0;
      font-size: 0.95rem;
    }
    .recruit-map-wrap {
      width: 100%;
      height: clamp(420px, 52vh, 620px);
      border-radius: var(--radius-md);
      border: 2px solid var(--border-brown);
      overflow: hidden;
      background: var(--bg-main);
    }
    @media (max-width: 991px) {
      .recruit-map-wrap {
        height: clamp(360px, 42vh, 460px);
      }
    }
    #recruitMap {
      width: 100%;
      height: 100%;
      min-height: 0;
      border: 0;
      border-radius: 0;
      z-index: 1;
    }
    .recruit-sidebar {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      align-self: start;
    }
    .recruit-sidebar > h3 {
      margin: 0 !important;
    }
    .player-list-wrap {
      max-height: clamp(280px, 38vh, 440px);
      overflow-y: auto;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-brown);
      background: var(--bg-main);
    }
    .player-list-row {
      padding: 0.45rem 0.7rem;
      cursor: pointer;
      border-bottom: 1px solid rgba(141,110,99,0.35);
      color: var(--text-main);
      transition: background 0.15s ease;
    }
    .player-list-row:hover, .player-list-row.active {
      background: rgba(255,215,0,0.07);
    }
    .player-list-row.active {
      border-left: 3px solid var(--gold);
      padding-left: calc(0.7rem - 3px);
      background: rgba(255,215,0,0.1);
    }
    .recruit-card-name {
      color: var(--gold);
      font-weight: 800;
      font-size: 0.88rem;
      line-height: 1.2;
    }
    .player-list-row.active .recruit-card-name { color: #ffe566; }
    .recruit-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
      margin-top: 0.25rem;
    }
    .recruit-badges-compact {
      margin-top: 0.2rem;
    }
    .recruit-badge {
      display: inline-block;
      padding: 0.08rem 0.38rem;
      border-radius: 999px;
      font-size: 0.64rem;
      font-weight: 800;
      line-height: 1.25;
      border: 1px solid rgba(255,215,0,0.35);
      background: rgba(255,215,0,0.1);
      color: var(--gold);
    }
    .recruit-badge-muted {
      border-color: rgba(141,110,99,0.5);
      background: rgba(30,30,30,0.6);
      color: var(--text-muted);
    }
    .recruit-card-meta {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
      line-height: 1.3;
    }
    .recruit-card-hometown { opacity: 0.9; }
    .recruit-detail-box {
      margin-top: 0;
      padding: 0.75rem 0.85rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-brown);
      background: #1a1a1a;
      font-size: 0.86rem;
      line-height: 1.4;
    }
    .recruit-detail-name {
      color: var(--gold);
      font-weight: 900;
      font-size: 0.98rem;
      margin: 0 0 0.3rem 0;
    }
    .recruit-detail-line {
      margin: 0.25rem 0;
      color: var(--text-main);
    }
    .recruit-detail-line strong { color: var(--text-muted); font-weight: 700; }
    .recruit-detail-stats {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.35rem;
    }
    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 0.55rem 0.65rem;
    }
    .filter-grid label {
      font-size: 0.78rem;
      color: var(--text-muted);
      display: block;
      margin-bottom: 0.15rem;
      font-weight: 600;
    }
    .filter-grid select,
    .filter-grid input.site-input {
      width: 100%;
      font-size: 0.88rem;
    }
    .filter-grid .filter-active select,
    .filter-grid .filter-active input.site-input {
      border-color: var(--gold);
      box-shadow: 0 0 0 1px rgba(255,215,0,0.25);
    }
    #fltDataset { font-weight: 700; }
    .recruit-filter-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      align-items: center;
      margin-top: 0.7rem;
      padding-top: 0.65rem;
      border-top: 1px solid rgba(141,110,99,0.35);
    }
    #clearFiltersBtn {
      font-size: 0.85rem;
      padding: 0.35rem 0.85rem;
    }
    #resultCount {
      font-weight: 700;
      color: var(--text-main);
      font-size: 0.88rem;
      line-height: 1.4;
    }
    .leaflet-popup.recruit-leaflet-popup .leaflet-popup-content-wrapper {
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-soft);
      background: #1a1a1a;
      border: 1px solid var(--border-brown);
      color: var(--text-main);
    }
    .leaflet-popup.recruit-leaflet-popup .leaflet-popup-content {
      margin: 10px 12px;
      line-height: 1.35;
    }
    .leaflet-popup.recruit-leaflet-popup .leaflet-popup-tip {
      background: #1a1a1a;
      border: 1px solid var(--border-brown);
      box-shadow: none;
    }
    .recruit-popup {
      min-width: 190px;
      max-width: 250px;
      line-height: 1.35;
      color: var(--text-main);
    }
    .recruit-popup-name {
      color: var(--gold);
      font-weight: 800;
      font-size: 0.92rem;
      margin-bottom: 0.25rem;
    }
    .recruit-popup .recruit-badges { margin: 0.25rem 0; }
    .recruit-popup .recruit-badge {
      font-size: 0.62rem;
      color: var(--gold);
      border-color: rgba(255,215,0,0.35);
      background: rgba(255,215,0,0.12);
    }
    .recruit-popup .recruit-badge-muted {
      color: var(--text-muted);
      border-color: rgba(141,110,99,0.45);
      background: rgba(30,30,30,0.5);
    }
    .recruit-popup-line {
      font-size: 0.78rem;
      margin: 0.15rem 0;
      color: var(--text-main);
    }
    .recruit-popup-line strong { color: var(--text-muted); font-weight: 700; }
    .recruit-popup .recruit-detail-stats {
      font-size: 0.72rem;
      margin-top: 0.25rem;
    }
    #recruitEmptyState {
      display: none;
      text-align: center;
      padding: 2.5rem 1.25rem;
      border-radius: var(--radius-md);
      border: 2px solid var(--border-brown);
      background: var(--bg-panel);
      max-width: 560px;
      margin: 2rem auto;
    }
    #recruitEmptyState p {
      margin: 0;
      color: var(--text-main);
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.5;
    }
    #recruitMainContent.recruit-hidden {
      display: none !important;
    }
    #recruitMapPendingBanner {
      display: none;
      margin-bottom: 1rem;
      padding: 0.85rem 1rem;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-brown);
      background: rgba(255, 215, 0, 0.06);
      color: var(--text-main);
      font-size: 0.95rem;
    }
    #recruitTeamThemeBanner {
      display: none;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.65rem;
      padding: 0.45rem 0.7rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-brown);
      background: rgba(255, 215, 0, 0.06);
      font-size: 0.84rem;
      color: var(--text-main);
    }
    #recruitTeamThemeBanner strong { color: var(--gold); }
    .recruit-theme-logo {
      width: 22px;
      height: 22px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .player-list-row-inner {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
    }
    .player-list-row-logo {
      flex-shrink: 0;
      padding-top: 0.1rem;
    }
    .player-list-row-body { flex: 1; min-width: 0; }
    .recruit-team-logo-sm,
    .recruit-team-logo-detail,
    .recruit-team-logo-popup {
      width: 28px;
      height: 28px;
      object-fit: contain;
      vertical-align: middle;
    }
    .recruit-team-logo-detail { width: 36px; height: 36px; }
    .recruit-card-commit {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-wrap: wrap;
    }
    .recruit-detail-header,
    .recruit-popup-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.35rem;
    }
    .recruit-detail-inner.has-team-branding,
    .recruit-detail-box.has-team-branding {
      border-left: 3px solid var(--recruit-team-primary, var(--gold));
    }
    .player-list-row.has-team-branding {
      border-left: 3px solid var(--recruit-team-primary, var(--gold));
      padding-left: calc(0.7rem - 3px);
    }
    .player-list-row.has-team-branding.active {
      background: color-mix(in srgb, var(--recruit-team-primary, #FFD700) 12%, transparent);
    }
    .player-list-row.has-team-branding .recruit-card-name {
      color: color-mix(in srgb, var(--recruit-team-primary, #FFD700) 55%, var(--gold));
    }
    .recruit-popup-branded {
      border-top: 3px solid var(--recruit-team-primary, var(--gold));
    }
    .leaflet-popup.recruit-leaflet-popup-team .leaflet-popup-content-wrapper {
      border-top: 3px solid var(--recruit-team-primary, var(--gold));
    }
    body.team-theme-active .recruit-filters.section-card,
    body.team-theme-active .recruit-map-panel {
      border-color: color-mix(in srgb, var(--recruit-team-primary, #8D6E63) 65%, var(--border-brown));
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--recruit-team-primary, #FFD700) 18%, transparent);
    }
    body.team-theme-active .recruit-map-wrap {
      border-color: var(--recruit-team-primary, var(--border-brown));
    }
    body.team-theme-active #recruitTeamThemeBanner {
      border-color: var(--recruit-team-primary, var(--border-brown));
      background: color-mix(in srgb, var(--recruit-team-primary, #3E2723) 18%, #1a1a1a);
    }
    body.team-theme-active .player-list-row.active {
      border-left-color: var(--recruit-team-primary, var(--gold));
    }
    body.team-theme-active #wrapFltTeam.filter-active input {
      border-color: var(--recruit-team-primary, var(--gold));
    }
    body.team-theme-active #resultCount strong {
      color: var(--recruit-team-primary, var(--gold));
    }
  </style>
</head>
<body>
  <nav class="navbar weeklypicks-navbar site-nav">
    <div class="container-fluid">
      <div class="navbar-content-weekly site-nav-inner">
        <button type="button" class="hamburger-menu-btn" onclick="toggleMenu()" aria-label="Menu" aria-expanded="false" aria-controls="dropdownMenu">
          <span></span><span></span><span></span>
        </button>
        <div class="dropdown-menu" id="dropdownMenu"></div>
        <h1 class="site-title">Recruit Map</h1>
        <div id="auth-nav" class="navbar-auth-cluster"></div>
      </div>
    </div>
  </nav>
  <div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>

  <main class="recruit-shell page-shell">
    <div id="recruitEmptyState" role="status">
      <p>Recruit map data is not loaded yet.</p>
      <p style="font-size:0.9rem; font-weight:500; margin-top:0.75rem; color:var(--text-muted);">Run <code style="color:#FFD700;">npm run export:recruits</code> locally (CFBD_API_KEY), commit <code style="color:#FFD700;">Frontend/data/recruits/</code>, then deploy.</p>
    </div>

    <div id="recruitMainContent">
    <div id="recruitMapPendingBanner" role="status"></div>
    <div class="section-card recruit-filters">
      <h2 class="gold-heading" style="font-size:1.15rem; margin-bottom:0.85rem;">Filters</h2>
      <div id="recruitTeamThemeBanner" role="status" aria-live="polite"></div>
      <div class="filter-grid">
        <div style="grid-column: 1 / -1;">
          <label for="fltDataset">Dataset</label>
          <select id="fltDataset" class="site-select"></select>
        </div>
        <div id="wrapFltTeam">
          <label for="fltTeam">Committed college</label>
          <input type="text" id="fltTeam" class="site-input" list="fltTeamList" placeholder="Search committed college…" autocomplete="off">
          <datalist id="fltTeamList"></datalist>
        </div>
        <div>
          <label for="fltConference">Conference</label>
          <select id="fltConference" class="site-select"><option value="">All conferences</option></select>
        </div>
        <div>
          <label for="fltYear">Year</label>
          <select id="fltYear" class="site-select"><option value="">All years</option></select>
        </div>
        <div>
          <label for="fltState">State</label>
          <select id="fltState" class="site-select"><option value="">All states</option></select>
        </div>
        <div>
          <label for="fltPosition">Position</label>
          <select id="fltPosition" class="site-select"><option value="">All positions</option></select>
        </div>
        <div>
          <label for="fltClassification">Classification</label>
          <select id="fltClassification" class="site-select"><option value="">All</option></select>
        </div>
        <div>
          <label for="fltStars">Stars</label>
          <select id="fltStars" class="site-select"><option value="">All</option></select>
        </div>
        <div>
          <label for="fltSearch">Player name</label>
          <input type="text" id="fltSearch" class="search-input site-input" placeholder="Search…" autocomplete="off">
        </div>
        <div>
          <label for="fltSchool">High school</label>
          <input type="text" id="fltSchool" class="search-input site-input" placeholder="School name…" autocomplete="off">
        </div>
      </div>
      <div class="recruit-filter-actions">
        <button type="button" class="btn btn-brown" id="clearFiltersBtn">Clear filters</button>
        <span id="resultCount">—</span>
      </div>
    </div>

    <div class="recruit-layout">
      <div class="section-card recruit-sidebar">
        <h3 class="gold-heading" style="font-size:1rem; margin-bottom:0.5rem;">Players</h3>
        <div class="player-list-wrap" id="playerList"></div>
        <div id="detailBox" class="recruit-detail-box">Select a player to view details.</div>
      </div>
      <div class="section-card recruit-map-panel">
        <h3 class="gold-heading">Map</h3>
        <div class="recruit-map-wrap">
          <div id="recruitMap" role="application" aria-label="Player hometown map"></div>
        </div>
      </div>
    </div>
    </div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" crossorigin=""></script>
  <script src="scripts/auth-ui.js"></script>
  <script src="scripts/recruit-team-branding.js"></script>
  <script src="scripts/recruit-map-static.js"></script>
  <script>
    /* Menu only — recruit map logic is in scripts/recruit-map-static.js (static JSON, no JawsDB). */

    function closeMenu() {
      var menu = document.getElementById('dropdownMenu');
      var btn = document.querySelector('.hamburger-menu-btn');
      var overlay = document.getElementById('menuOverlay');
      if (!menu || !overlay) return;
      menu.classList.remove('show');
      if (btn) {
        btn.classList.remove('active');
        btn.setAttribute('aria-expanded', 'false');
      }
      overlay.classList.remove('show');
      document.body.classList.remove('menu-open');
    }

    function toggleMenu() {
      var menu = document.getElementById('dropdownMenu');
      var btn = document.querySelector('.hamburger-menu-btn');
      var overlay = document.getElementById('menuOverlay');
      if (!menu || !overlay) return;
      var open = !menu.classList.contains('show');
      menu.classList.toggle('show', open);
      if (btn) {
        btn.classList.toggle('active', open);
        btn.setAttribute('aria-expanded', open ? 'true' : 'false');
      }
      overlay.classList.toggle('show', open);
      document.body.classList.toggle('menu-open', open);
    }

    document.addEventListener('click', function (ev) {
      var menu = document.getElementById('dropdownMenu');
      var btn = document.querySelector('.hamburger-menu-btn');
      if (!menu || !btn) return;
      if (!menu.contains(ev.target) && !btn.contains(ev.target)) closeMenu();
    });

    document.addEventListener('keydown', function (ev) {
      if (ev.key === 'Escape') closeMenu();
    });
  </script>
</body>
</html>
