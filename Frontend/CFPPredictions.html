document.querySelector('form[name="predictions"]').addEventListener('submit', function(e) {
  e.preventDefault(); // stop normal page reload

  const formData = new FormData(form);

  // ✅ 1. Build preview
  const user = formData.get("user");
  let html = `<h2 class="display-title">Your Predictions</h2><p class="name-display"><strong>Name:</strong> ${user}</p><ul class="list-group">`;
  for (let i = 1; i <= 12; i++) {
    html += `<li class="list-group-item">
      Game ${i}: ${formData.get("game" + i)}
    </li>`;
  }
  html += "</ul>";
</script>
});

  <script>
    function closeMenu() {
      const menu = document.getElementById('dropdownMenu');
      const button = document.querySelector('.hamburger-menu-btn');
      const overlay = document.getElementById('menuOverlay');
      if (!menu || !button || !overlay) return;
      menu.classList.remove('show');
      button.classList.remove('active');
      button.setAttribute('aria-expanded', 'false');
      overlay.classList.remove('show');
      document.body.classList.remove('menu-open');
    }

    function toggleMenu() {
      const menu = document.getElementById('dropdownMenu');
      const button = document.querySelector('.hamburger-menu-btn');
      const overlay = document.getElementById('menuOverlay');
      if (!menu || !button || !overlay) return;
      const isOpening = !menu.classList.contains('show');
      menu.classList.toggle('show');
      button.classList.toggle('active');
      button.setAttribute('aria-expanded', isOpening ? 'true' : 'false');
      overlay.classList.toggle('show', isOpening);
      document.body.classList.toggle('menu-open', isOpening);
    }

    document.addEventListener('click', function(event) {
      const menu = document.getElementById('dropdownMenu');
      const button = document.querySelector('.hamburger-menu-btn');
      if (!menu || !button) return;
      if (!menu.contains(event.target) && !button.contains(event.target)) closeMenu();
    });

    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape') closeMenu();
    });
  </script>
